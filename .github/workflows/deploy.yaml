name : Deploy Cover Backend 

on : 
  push :
    branches :
      - main

jobs :
  deploy :
    runs-on : ubuntu-latest

    steps :
      - name : Checkout Code
        uses : actions/checkout@v5

      - name : Deploy via SSH
        uses : appleboy/ssh-action@v1.0.3
        with :
          host : ${{ secrets.SSH_HOST }}
          username : ubuntu
          key : ${{ secrets.SSH_KEY }} 
          port: 4096
          script: |
            cd /home/ubuntu/projects/cover/cover-be
            git pull
            docker compose -f docker-compose.production.yml up -d --build --force-recreate






